<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Search</title>
  <style>
    #loading, #error { 
      display: none; 
      margin-top: 10px; 
    }

    #loading { 
      color: blue; 
    }
    #error { 
      color: darkred; 
    }
    #pagination {
      list-style: none;
      display: flex;
    }


  
  </style>
</head>
<body>
  <h2>User List</h2>

  <div id="loading">Loading...</div>
  <div id="error">Something went wrong!</div>

  <ul id="userList"></ul>

  <div id="controls">
    <button id="loadBtn">Load Users</button>
    <button id="retryBtn" disabled>Retry</button>
    <button id="prevBtn" disabled>Previous</button>
    <button id="nextBtn" disabled>Next</button>
  </div>
 
  <script>

    let currentPage = 1;          // Tracks the current page
    const usersPerPage = 5;       // Number of users per page
    let allUsers = [];            // Stores all fetched users


    const userList = document.getElementById('userList');
    const error = document.getElementById('error');
    const loading = document.getElementById('loading');
    const loadBtn = document.getElementById('loadBtn');
    const retryBtn = document.getElementById('retryBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    async function loadUsers() {
      try {
        loading.style.display = 'block';
        loadBtn.disabled = true;
        error.style.display = 'none';
        
        const response = await fetch('https://jsonplaceholder.typicode.com/users');
        if (!response.ok) throw new Error('Network error');
        
        allUsers = await response.json();
        currentPage = 1;
        renderPage(currentPage);
      } catch (err) {
        error.style.display = 'block';
        retryBtn.disabled = false;
      } finally {
        loading.style.display = 'none';
        loadBtn.disabled = false;
      }
    }


    function renderPage(page) {
      userList.innerHTML = '';
      
      const start = (page - 1) * usersPerPage;
      const end = start + usersPerPage;
      const pageUsers = allUsers.slice(start, end);
      
      pageUsers.forEach(user => {
        const li = document.createElement('li');
        li.className = 'user';
        li.innerHTML = `<strong>${user.name}</strong><br>
                        Email: ${user.email}<br>
                        City: ${user.address.city}`;
        userList.appendChild(li);
      });
      
      prevBtn.disabled = page === 1;
      nextBtn.disabled = end >= allUsers.length;
    }

    loadBtn.addEventListener('click', loadUsers);
    retryBtn.addEventListener('click', loadUsers);


    prevBtn.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        renderPage(currentPage);
      }
    });
    
    nextBtn.addEventListener('click', () => {
      if ((currentPage * usersPerPage) < allUsers.length) {
        currentPage++;
        renderPage(currentPage);
      }
    });


  </script>
</body>
</html>
