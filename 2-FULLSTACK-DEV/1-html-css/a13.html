<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assignment-13: CSS Keyframe Animations</title>
  <style>
    .container{
      width: 50vw;
      display: flex;
      justify-content: space-between;
    }
    .ball {
      width: 50px;
      height: 50px;
      background: crimson;
      border-radius: 50%;
      position: relative;
      animation: bounce 1s infinite ease-in-out;
    }

    @keyframes bounce{
      0%, 100% {
        top: 0;
      }
      50% {
        top: 150px;
      }
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 6px solid #ddd;
      border-top: 6px solid royalblue;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin{
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }


    .pulse-btn {
      padding: 2px 15px;
      font-size: 16px;
      background: mediumseagreen;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse{
      0%, 100%{
        transform: scale(1); opacity: 1;
      }
      50%{
        transform: scale(1.1); opacity: 0.7;
      }
    }



   
  </style>
</head>
<body>
  <h1>Assignment-13: CSS Keyframe Animations</h1>
  <hr>
  <div class="container">
    <div class="ball"></div>
    <div class="loader"></div>
    <button class="pulse-btn">Click Me</button>
  </div>
</body>
</html>
