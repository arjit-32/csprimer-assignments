<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>   
    /* Global defaults */
     :root{
        --color-bg: #ffffff;
        --color-text: #222222;
        --color-primary: #0077cc;
        --color-primary-dark: #005fa3;
     }

     /* Redefine the variable when body has dark-mode class  */
     .dark-mode{
      --color-bg: #121212;
      --color-text: #e0e0e0;
      --color-primary: #66ccff;
     }

     /* Styling the page using variables */
     body{
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family: Arial, sans-serif;
        /* animating the color change */
        transition: background-color 0.3s, color 0.3s; 
     }

     button {
        background-color: var(--color-primary);
        color: #fff;
        padding: 10px;
        border-radius: 5px;
        border: none;
    }

    button:hover {
        background-color: var(--color-primary-dark);
    }

    </style>
</head>
<body>
    <h1>Assignment 10: CSS Variables and Themes </h1>
    <hr>
    
    <p>This text will change colors based on the theme.</p>
    <button onclick="document.body.classList.toggle('dark-mode')">Click Me</button>

</body>
</html>
