<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assignment-16: Forms UI</title>
  <style>
   input[type="checkbox"] {
    appearance: none;          /* remove browser’s default style */
    -webkit-appearance: none;  /* Safari support */
    width: 25px;
    height: 25px;
    border: 2px dotted teal;   /* your custom box */
    position: relative;        /* anchor for pseudo-element */
    cursor: pointer;
  }

  input[type="checkbox"]:checked::before {
    content: "✔";              /* your custom checkmark */
    color: teal;
    font-size: 16px;
    position: absolute;
    top: 50%;                  /* center vertically */
    left: 50%;                 /* center horizontally */
    transform: translate(-50%, -50%);
  }

  /* Removing the default appearance, also removes the browsers default focus highlight */
  input[type="checkbox"]:focus {
    outline: 2px solid teal;
    outline-offset: 2px;
  }


  /* Radio Button */
  input[type="radio"] {
    appearance: none;          /* remove browser default look */
    -webkit-appearance: none;  /* Safari support */
    width: 20px;               /* size of the circle */
    height: 20px;
    border: 2px solid blue;   
    border-radius: 50%;       
    position: relative;        /* anchor for the dot */
    cursor: pointer;          
  }

  input[type="radio"]:checked::before {
    content: "";               /* empty content, just a shape */
    position: absolute;
    top: 50%;                  
    left: 50%;                 
    width: 10px;               
    height: 10px;
    background: darkblue;     
    border-radius: 50%;      
    transform: translate(-50%, -50%); 
  }

  input[type="radio"]:hover {
    border-color: lightblue;   
  }

  /* Focus effect (keyboard navigation) */
  input[type="radio"]:focus {
    box-shadow: 0 0 4px darkblue; /* glow when focused */
    outline: none;                
  }

  .form-group {
    width: 300px;
    position: relative;  
  }

  .form-group input {
    width: 100%;
    padding: 12px 8px;
    border: 2px solid #ccc;
    border-radius: 4px;
    font-size: 16px;
  }

  .form-group label {
    position: absolute;
    left: 10px;
    top: 12px;
    color: #666;
    transition: 0.2s ease all;  /* smooth movement */
    pointer-events: none;       /* label doesn’t block clicks */
  }

  /* Float label when input is focused or has text */
  .form-group input:focus + label,  /* When the input is focused (clicked into or tabbed into), select the label that comes right after it. */
  .form-group input:not(:placeholder-shown) + label { /* When the input is not showing its placeholder, meaning the user has typed something so select label that comes right after it. */
    top: -8px;          /* move label above */
    font-size: 12px;    
    color: blue;        
  }


  button {
    padding: 10px 20px;        
    border: none;              
    border-radius: 4px;       
    background-color: blue;    
    color: white;              
    font-size: 16px;           
    cursor: pointer;          
  }

  button:hover {
    background-color: darkblue; 
  }

  button:focus {
    outline: 2px solid lightblue; /* visible outline when focused */
    outline-offset: 2px;
  }


  </style>
</head>
<body>
  <h1>Assignment-16: Forms UI</h1>
  <hr>
  <form>
    <br/><br/><br/>
    <!-- Floating label input -->
    <div class="form-group">
      <input type="text" id="username" placeholder=" " required>
      <label for="username">Username</label>
    </div>

    <br/><br/><br/>
    <!-- Custom checkbox -->
    <label>
      <input type="checkbox" name="terms">
      Accept Terms
    </label>

    <br/><br/><br/>
    <!-- Custom radio buttons -->
    <div>
      <label><input type="radio" name="choice" value="A"> Option A</label>
      <label><input type="radio" name="choice" value="B"> Option B</label>
    </div>

    <br/><br/><br/>
    <button type="submit">Submit</button>
  </form>
</body>
</html>
